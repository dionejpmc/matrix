{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-slate-950 p-4">
    <div class="max-w-md w-full bg-slate-900 border border-slate-800 p-8 rounded-2xl shadow-xl">
        <h2 class="text-2xl font-bold text-white mb-6 text-center">Novo Operador Matrix</h2>
        
        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            {% for field in form %}
                <div class="flex flex-col">
                    <label class="text-sm font-medium text-slate-400 mb-1" for="{{ field.id_for_label }}">
                        {{ field.label }}
                    </label>
                    {# O Django renderiza o input aqui, mas as classes vêm do forms.py acima #}
                    {{ field }}
                    
                    {% if field.errors %}
                        <span class="text-xs text-red-500">{{ field.errors|striptags }}</span>
                    {% endif %}
                </div>
            {% endfor %}

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-colors mt-4">
                Cadastrar Usuário
            </button>
        </form>
    </div>
</div>
{% endblock %}
